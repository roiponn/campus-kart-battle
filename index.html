<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Campus Kart Battle</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b0d1e'/%3E%3Cpath d='M12 40h40v8H12zM18 28h28l6 12H12z' fill='%23ffc44d'/%3E%3Ccircle cx='22' cy='48' r='5' fill='%236a2fe0'/%3E%3Ccircle cx='44' cy='48' r='5' fill='%236a2fe0'/%3E%3C/svg%3E">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0d1e;
    font-family:'Segoe UI','Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',Meiryo,Arial,sans-serif;
    -webkit-user-select:none;user-select:none;}
  #gl{display:block;position:fixed;inset:0;width:100%;height:100%;touch-action:none;}
  #fx2d{position:fixed;inset:0;pointer-events:none;z-index:6;}

  /* ============ HUD (image C layout) ============ */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;color:#fff;display:none;}
  .hudTxt{font-weight:900;text-shadow:0 3px 12px rgba(0,0,0,.75),0 1px 2px rgba(0,0,0,.85),0 0 3px rgba(0,0,0,.5);}
  #lapBox{position:absolute;top:26px;left:34px;display:flex;align-items:baseline;gap:10px;}
  #lapBox .lbl{font-size:27px;font-weight:900;}
  #lapBox .val{font-size:48px;letter-spacing:1px;}
  #posBox{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:76px;line-height:1;}
  #posBox .ord{font-size:38px;vertical-align:24px;margin-left:3px;}
  #itemBox{position:absolute;top:24px;right:34px;width:92px;height:92px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,#272b46 0%,#131629 72%);
    border:6px solid #14161f;box-shadow:0 5px 16px rgba(0,0,0,.55),0 0 0 2px rgba(255,255,255,.10),inset 0 0 20px rgba(0,0,0,.65);
    display:flex;align-items:center;justify-content:center;}
  #itemIcon{font-size:48px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));transition:transform .08s;}
  #itemCount{position:absolute;right:-3px;bottom:-3px;width:32px;height:32px;border-radius:50%;
    background:#0f1120;border:2.5px solid #fff;color:#fff;font-weight:900;font-size:17px;
    display:none;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.5);}
  #speedBox{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;}
  #speedNum{font-size:74px;line-height:.92;}
  #speedUnit{font-size:23px;font-weight:900;opacity:.95;margin-top:2px;}
  #countdown{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%);
    font-size:150px;font-weight:900;color:#ffd257;
    text-shadow:0 0 28px rgba(255,150,40,.85),0 6px 14px rgba(0,0,0,.6);display:none;}
  .pop{animation:pop .82s ease-out;}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(1.9);opacity:0;}18%{opacity:1;}
    70%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{opacity:0;}}
  #banner{position:absolute;top:23%;left:50%;transform:translateX(-50%);font-size:56px;font-weight:900;
    color:#ff9b3d;letter-spacing:5px;text-shadow:0 0 24px rgba(255,120,30,.9),0 4px 10px rgba(0,0,0,.6);
    display:none;white-space:nowrap;}
  .bannerIn{animation:bannerIn 2.4s ease-out;}
  @keyframes bannerIn{0%{transform:translateX(-50%) scale(2.1);opacity:0;}14%{opacity:1;transform:translateX(-50%) scale(1);}
    80%{opacity:1;}100%{opacity:0;}}
  #toast{position:absolute;top:112px;right:26px;background:rgba(14,16,36,.85);border:1.5px solid rgba(255,255,255,.35);
    padding:7px 14px;border-radius:999px;font-size:17px;font-weight:800;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4);}
  #wrongWay{position:absolute;top:44%;left:50%;transform:translateX(-50%);font-size:44px;font-weight:900;color:#ff5a5a;
    text-shadow:0 0 18px rgba(255,60,60,.8),0 3px 8px rgba(0,0,0,.6);display:none;animation:blink .5s infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .itemPop{animation:itemPop .45s cubic-bezier(.2,2.4,.4,1);}
  @keyframes itemPop{0%{transform:scale(.6);}55%{transform:scale(1.18);}100%{transform:scale(1);}}
  .rankUp{animation:rankUp .55s cubic-bezier(.2,2.2,.4,1);}
  @keyframes rankUp{0%{transform:translateX(-50%) scale(1);}
    35%{transform:translateX(-50%) scale(1.35);color:#ffd257;text-shadow:0 0 22px rgba(255,200,70,.95),0 3px 12px rgba(0,0,0,.75);}
    100%{transform:translateX(-50%) scale(1);}}
  .toastIn{animation:toastIn .5s cubic-bezier(.2,2.2,.4,1);}
  .boostGlow #speedNum{color:#9fe8ff;text-shadow:0 0 20px rgba(90,210,255,.95),0 3px 12px rgba(0,0,0,.75);}
  .boostGlow #speedUnit{color:#c9f2ff;}
  .rrowIn{animation:rrowIn .5s cubic-bezier(.2,1.8,.4,1) backwards;}
  @keyframes rrowIn{0%{transform:translateY(16px) scale(.92);opacity:0;}100%{transform:none;opacity:1;}}
  @keyframes toastIn{0%{transform:translateY(-14px) scale(.7);opacity:0;}60%{transform:translateY(2px) scale(1.06);opacity:1;}100%{transform:none;}}
  #muteHint{position:absolute;bottom:14px;right:18px;font-size:13px;font-weight:700;opacity:.65;}
  #lapTime{position:absolute;top:84px;left:36px;font-size:16px;font-weight:800;opacity:.7;}

  /* ============ Touch UI (mobile landscape) ============ */
  #touchUI{position:absolute;inset:0;pointer-events:none;display:none;}
  body.touch #touchUI{display:block;}
  .tbtn{position:absolute;pointer-events:auto;width:74px;height:74px;border-radius:50%;
    background:rgba(18,20,44,.55);border:2px solid rgba(255,255,255,.42);color:#fff;
    font-size:30px;font-weight:900;display:flex;align-items:center;justify-content:center;
    user-select:none;-webkit-user-select:none;touch-action:none;
    box-shadow:0 4px 14px rgba(0,0,0,.45);}
  .tbtn.on{background:rgba(255,255,255,.28);transform:scale(.93);}
  #btnL{left:20px;bottom:24px;}
  #btnR{left:116px;bottom:24px;}
  #btnDrift{right:22px;bottom:22px;width:92px;height:92px;font-size:19px;letter-spacing:.05em;
    background:rgba(112,62,224,.5);border-color:rgba(205,170,255,.75);}
  #btnItem{right:126px;bottom:26px;width:86px;height:86px;overflow:hidden;isolation:isolate;
    background:linear-gradient(145deg,rgba(255,212,90,.92),rgba(216,92,72,.72) 54%,rgba(108,48,210,.74));
    border:3px solid rgba(255,242,176,.88);font-size:35px;
    box-shadow:0 7px 20px rgba(0,0,0,.48),0 0 20px rgba(255,190,80,.32),inset 0 2px 0 rgba(255,255,255,.4);}
  #btnItem::before{content:'';position:absolute;inset:8px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.35),rgba(255,215,100,.16) 48%,rgba(33,24,68,.42) 78%);
    z-index:-1;}
  #btnItem::after{content:'';position:absolute;inset:3px;border-radius:50%;border:2px solid rgba(255,255,255,.48);
    box-shadow:0 0 18px rgba(255,230,130,.38);opacity:.68;}
  #btnItemIcon{position:relative;z-index:1;filter:drop-shadow(0 3px 5px rgba(0,0,0,.6));transform:translateY(-1px);}
  #btnItem.ready{animation:itemReady 1.15s ease-in-out infinite;}
  #btnItem.ready::after{opacity:1;box-shadow:0 0 28px rgba(255,230,130,.88),0 0 12px rgba(255,255,255,.55) inset;}
  #btnItem.rolling #btnItemIcon{animation:itemRoulette .42s steps(2,end) infinite;}
  #btnItem.empty{background:rgba(18,20,44,.55);border-color:rgba(255,255,255,.34);box-shadow:0 4px 14px rgba(0,0,0,.45);opacity:.78;}
  #btnItem.empty::after{opacity:.26;box-shadow:none;}
  #btnItem.on{animation:none;transform:scale(.93);}
  @keyframes itemReady{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
  @keyframes itemRoulette{0%{transform:translateY(-1px) rotate(-8deg) scale(.96);}100%{transform:translateY(-1px) rotate(8deg) scale(1.08);}}
  #btnBrake{right:38px;bottom:132px;width:58px;height:58px;font-size:24px;background:rgba(200,60,60,.4);border-color:rgba(255,160,160,.7);}
  #rotateHint{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(8,9,22,.92);color:#fff;font-weight:900;font-size:24px;gap:12px;text-align:center;}
  #rotateHint .ph{font-size:64px;animation:rot 1.6s ease-in-out infinite;}
  @keyframes rot{0%,20%{transform:rotate(0);}60%,100%{transform:rotate(90deg);}}
  @media (orientation:portrait){ body.touch #rotateHint{display:flex;} }
  @media (max-height:560px){
    #lapBox{top:14px;left:20px;} #lapBox .lbl{font-size:20px;} #lapBox .val{font-size:34px;}
    #lapTime{top:56px;left:22px;font-size:13px;}
    #posBox{top:10px;font-size:54px;} #posBox .ord{font-size:27px;vertical-align:16px;}
    #itemBox{top:14px;right:20px;width:70px;height:70px;border-width:5px;} #itemIcon{font-size:36px;}
    #itemCount{width:26px;height:26px;font-size:14px;}
    #speedBox{bottom:16px;} #speedNum{font-size:52px;} #speedUnit{font-size:17px;}
    #countdown{font-size:104px;} #banner{font-size:40px;}
    #title h1 .t1{font-size:min(7vw,56px);} #title h1 .t2{font-size:min(8.6vw,70px);}
    #title .sub{font-size:15px;margin-top:8px;} .btn{margin-top:14px;padding:12px 40px;font-size:20px;}
    #titleFoot{display:none;} #muteHint{display:none;}
  }
  body.touch #controls{display:none;}
  #tiltBtn{pointer-events:auto;cursor:pointer;margin-top:14px;padding:9px 22px;border-radius:999px;display:none;
    background:rgba(30,32,64,.7);border:1.5px solid rgba(160,160,220,.5);color:#dfe0f5;font-weight:800;font-size:15px;font-family:inherit;}
  body.touch #tiltBtn{display:inline-block;}

  /* ============ Title screen ============ */
  #title{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,rgba(64,54,140,.42) 0%,rgba(20,22,46,.62) 52%,rgba(9,10,26,.82) 100%);}
  #title h1{margin:0;text-align:center;line-height:1.04;font-weight:900;}
  #title .t1{display:block;font-size:min(9vw,84px);letter-spacing:.22em;color:#c9a0ff;
    text-shadow:0 0 14px #8b4dff,0 0 42px rgba(140,70,255,.85),0 4px 10px rgba(0,0,0,.6);}
  #title .t2{display:block;font-size:min(11vw,104px);letter-spacing:.06em;color:#ffc44d;
    text-shadow:0 0 14px #ff9020,0 0 46px rgba(255,140,20,.8),0 4px 12px rgba(0,0,0,.6);}
  #title .sub{margin-top:14px;color:#e8e6ff;font-weight:800;font-size:19px;letter-spacing:.35em;
    text-shadow:0 2px 8px rgba(0,0,0,.7);}
  #controls{display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center;max-width:640px;margin:30px 20px 8px;}
  #controls span{color:#dfe0f2;font-size:15px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.7);}
  kbd{display:inline-block;min-width:20px;text-align:center;padding:3px 8px;margin-right:6px;border-radius:7px;
    background:linear-gradient(#3a3d63,#23254a);border:1px solid #6f74b8;color:#fff;font-weight:900;font-size:14px;
    box-shadow:0 2px 0 #14152e;font-family:inherit;}
  .btn{pointer-events:auto;cursor:pointer;border:none;margin-top:26px;padding:16px 54px;border-radius:999px;
    font-size:24px;font-weight:900;color:#fff;letter-spacing:.12em;font-family:inherit;
    background:linear-gradient(180deg,#9256ff 0%,#6a2fe0 55%,#5423c0 100%);
    box-shadow:0 0 26px rgba(140,80,255,.8),0 8px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .12s;}
  .btn:hover{transform:scale(1.06);}
  .btn:active{transform:scale(.97);}
  .lantern{position:absolute;font-size:34px;animation:sway 3.4s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(255,140,40,.9));}
  @keyframes sway{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg) translateY(4px);}}
  #titleFoot{position:absolute;bottom:16px;color:#8f92b8;font-size:13px;font-weight:700;letter-spacing:.08em;}

  /* ============ Results ============ */
  #result{position:fixed;inset:0;z-index:18;display:none;align-items:center;justify-content:center;
    box-sizing:border-box;padding:12px;overflow:auto;background:rgba(8,9,22,.45);}
  #resultCard{box-sizing:border-box;min-width:min(360px,92vw);width:min(520px,92vw);max-width:92vw;max-height:calc(100dvh - 24px);
    overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:rgba(17,19,42,.94);border:1.5px solid rgba(160,150,255,.35);
    border-radius:20px;padding:26px 30px 24px;box-shadow:0 14px 50px rgba(0,0,0,.6),0 0 40px rgba(110,70,230,.25);
    color:#fff;text-align:center;}
  @supports not (height:100dvh){#resultCard{max-height:calc(100vh - 24px);}}
  #resultCard h2{margin:0 0 4px;font-size:34px;font-weight:900;letter-spacing:.1em;color:#ffc44d;
    text-shadow:0 0 16px rgba(255,150,30,.7);}
  #resultCard .sub2{font-size:14px;font-weight:700;color:#b9bce0;margin-bottom:16px;letter-spacing:.2em;}
  .rrow{display:flex;align-items:center;gap:14px;padding:9px 12px;margin:7px 0;border-radius:12px;
    background:rgba(255,255,255,.05);font-weight:800;font-size:19px;}
  .rrow.me{background:rgba(140,90,255,.22);border:1px solid rgba(170,120,255,.55);}
  .rbadge{width:44px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:17px;color:#1c1c28;flex:none;}
  .rname{flex:1;text-align:left;display:flex;align-items:center;gap:9px;}
  .rdot{width:14px;height:14px;border-radius:4px;flex:none;box-shadow:0 0 6px rgba(0,0,0,.5);}
  .rtime{font-variant-numeric:tabular-nums;font-size:17px;color:#dfe0f5;}
  #retryBtn{position:sticky;bottom:0;z-index:1;}
  @media (max-height:560px){
    #result{align-items:flex-start;padding:8px;}
    #resultCard{padding:14px 16px 12px;border-radius:16px;max-height:calc(100dvh - 16px);}
    #resultCard h2{font-size:24px;}
    #resultCard .sub2{font-size:11px;margin-bottom:8px;}
    .rrow{gap:9px;padding:7px 9px;margin:5px 0;font-size:16px;}
    .rbadge{width:38px;height:28px;font-size:14px;border-radius:8px;}
    .rdot{width:12px;height:12px;}
    .rtime{font-size:14px;}
    #retryBtn{margin-top:10px!important;padding:10px 30px!important;font-size:17px!important;}
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="fx2d"></canvas>

<div id="hud">
  <div id="lapBox" class="hudTxt"><span class="lbl">Lap</span><span class="val" id="lapVal">1/3</span></div>
  <div id="lapTime" class="hudTxt">0:00.00</div>
  <div id="posBox" class="hudTxt"><span id="posNum">4</span><span class="ord" id="posOrd">th</span></div>
  <div id="itemBox"><span id="itemIcon"></span><span id="itemCount">1</span></div>
  <div id="speedBox" class="hudTxt"><div id="speedNum">0</div><div id="speedUnit">km/h</div></div>
  <div id="countdown"></div>
  <div id="banner"></div>
  <div id="toast"></div>
  <div id="wrongWay">⟲ 逆走中！</div>
  <div id="muteHint" class="hudTxt">M : サウンド</div>
  <div id="touchUI">
    <div class="tbtn" id="btnL">◀</div>
    <div class="tbtn" id="btnR">▶</div>
    <div class="tbtn" id="btnBrake">⏬</div>
    <div class="tbtn empty" id="btnItem" aria-label="アイテムを使う"><span id="btnItemIcon">🎁</span></div>
    <div class="tbtn" id="btnDrift">DRIFT</div>
  </div>
</div>
<div id="rotateHint"><div class="ph">📱</div><div>横向きにしてね</div></div>

<div id="title">
  <span class="lantern" style="left:12%;top:16%;">🏮</span>
  <span class="lantern" style="left:22%;top:9%;animation-delay:.7s;">🏮</span>
  <span class="lantern" style="right:20%;top:11%;animation-delay:1.2s;">🏮</span>
  <span class="lantern" style="right:11%;top:20%;animation-delay:.3s;">🏮</span>
  <h1><span class="t1">CAMPUS</span><span class="t2">KART BATTLE</span></h1>
  <div class="sub">— 夜のキャンパス祭 3LAPレース —</div>
  <div id="controls">
    <span><kbd>W</kbd>加速</span><span><kbd>S</kbd>ブレーキ/後退</span>
    <span><kbd>A</kbd><kbd>D</kbd>曲がる</span><span><kbd>SPACE</kbd>ドリフト</span>
    <span><kbd>E</kbd>アイテム</span><span><kbd>M</kbd>サウンド</span>
  </div>
  <button class="btn" id="startBtn">レーススタート</button>
  <button id="tiltBtn">📱 傾きハンドル : OFF</button>
  <div id="titleFoot">CPUライバル3人と勝負！ ドリフト長押しでミニターボ</div>
</div>

<div id="result"><div id="resultCard">
  <h2 id="resultHead">FINISH!</h2><div class="sub2">RACE RESULT</div>
  <div id="resultRows"></div>
  <button class="btn" id="retryBtn" style="margin-top:18px;font-size:20px;padding:13px 44px;">もう一度あそぶ</button>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* =====================================================================
   Campus Kart Battle — 単一HTML 3Dアーケードカートレース (Three.js r128)
   ===================================================================== */
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const damp = (a, b, k, dt) => lerp(a, b, 1 - Math.exp(-k * dt));
const rnd = (a, b) => a + Math.random() * (b - a);
const wrap01 = s => ((s % 1) + 1) % 1;
const wrapDS = ds => ds > .5 ? ds - 1 : (ds < -.5 ? ds + 1 : ds);
const angLerp = (a, b, t) => { let d = b - a; while (d > Math.PI) d -= TAU; while (d < -Math.PI) d += TAU; return a + d * t; };
const fmtTime = t => { const m = Math.floor(t / 60), s = Math.floor(t % 60), c = Math.floor((t * 100) % 100);
  return m + ':' + String(s).padStart(2, '0') + '.' + String(c).padStart(2, '0'); };

const CFG = {
  SAMPLES: 900, HALF_W: 7.5, MAXLAT: 6.4,
  MAXSPD: 26, ACCEL: 15, BRAKE: 26, REV_MAX: 8, COAST: 7.5, GRAV: 26,
  TURN_LO: 2.25, TURN_HI: 1.35, KMH: 3.35, LAPS: 3,
  WALL_CD: .35, SPIN_T: 1.1,
  PAD_BOOST: 1.45, PAD_T: 1.15, ENERGY_BOOST: 1.5, ENERGY_T: 1.6,
  DRIFT_S1: .55, DRIFT_S2: .95,
};

/* ---------------- input ---------------- */
const keys = {};
const KEYMAP = { KeyW:'up', ArrowUp:'up', KeyS:'down', ArrowDown:'down', KeyA:'left', ArrowLeft:'left',
  KeyD:'right', ArrowRight:'right', Space:'drift', KeyE:'item' };
addEventListener('keydown', e => {
  const k = KEYMAP[e.code];
  if (k) { keys[k] = true; e.preventDefault(); }
  if (e.code === 'KeyM') AudioSys.toggleMute();
  if (e.code === 'KeyE') tryUseItem(racers && racers[0]);
  if ((e.code === 'Enter' || e.code === 'Space') && state === 'title') startRace();
  if (e.code === 'KeyR' && state === 'finished') retryRace();
});
addEventListener('keyup', e => { const k = KEYMAP[e.code]; if (k) keys[k] = false; });

/* ---------------- touch & tilt (mobile) ---------------- */
const touchMode = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
let tiltOn = false, tiltSteer = 0;
if (touchMode) document.body.classList.add('touch');
function bindHold(id, key) {
  const el = $(id);
  const on = e => { e.preventDefault(); keys[key] = true; el.classList.add('on'); };
  const off = e => { e.preventDefault(); keys[key] = false; el.classList.remove('on'); };
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off); el.addEventListener('touchcancel', off);
  el.addEventListener('mousedown', on); el.addEventListener('mouseup', off); el.addEventListener('mouseleave', off);
}
addEventListener('DOMContentLoaded', () => {
  // Touch arrows are mirrored to match the chase-camera steering direction.
  bindHold('btnL', 'right'); bindHold('btnR', 'left');
  bindHold('btnDrift', 'drift'); bindHold('btnBrake', 'down');
  const ib = $('btnItem');
  const useIt = e => { e.preventDefault(); ib.classList.add('on'); setTimeout(() => ib.classList.remove('on'), 120);
    tryUseItem(racers && racers[0]); };
  ib.addEventListener('touchstart', useIt, { passive: false });
  ib.addEventListener('mousedown', useIt);
  $('tiltBtn').addEventListener('click', toggleTilt);
});
document.addEventListener('touchmove', e => { if (e.target.closest('#touchUI')) e.preventDefault(); }, { passive: false });
function normalizedOrientationAngle(angle) {
  const n = Number(angle) || 0;
  return ((n % 360) + 360) % 360;
}
function currentOrientationAngle() {

function facadeTex(w, h, base, mortar, rows, cols, litP, extra) {
  return textTex(w, h, (g, W, H) => {
    g.fillStyle = base; g.fillRect(0, 0, W, H);
    g.strokeStyle = mortar; g.lineWidth = 2;
    for (let y = 0; y < H; y += 18) { g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke(); }
    g.fillStyle = 'rgba(196,176,142,.3)';                        // stone floor bands
    for (let r = 1; r <= rows; r++) g.fillRect(0, H * r / (rows + .7) - 3, W, 6);
    g.fillStyle = 'rgba(196,176,142,.42)'; g.fillRect(0, 0, W, 9); // cornice
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const x = W * (c + .5) / cols - W / cols * .26, y = H * (r + .62) / (rows + .7) - H / rows * .2;
      const lit = Math.random() < litP;
      g.fillStyle = lit ? (Math.random() < .5 ? '#ffd98a' : '#ffedbe') : '#1a2030';
      if (lit) { g.shadowColor = '#ffcf70'; g.shadowBlur = 10; } else g.shadowBlur = 0;
      g.fillRect(x, y, W / cols * .52, H / rows * .4);
      g.shadowBlur = 0;
      g.lineWidth = 3; g.strokeStyle = '#1c1e28'; g.strokeRect(x, y, W / cols * .52, H / rows * .4);
      g.fillStyle = 'rgba(196,176,142,.5)';                      // sill
      g.fillRect(x - 2, y + H / rows * .4, W / cols * .52 + 4, 4);
      g.lineWidth = 2; g.strokeStyle = mortar;
    }
    if (extra) extra(g, W, H);
  });
}

function lanternRun(x1, z1, x2, z2) {     // continuous roadside lantern string (image C look)
  const lat = -(CFG.HALF_W + 3.2);
  const sA = sOf(x1, z1), sB = sOf(x2, z2);
  const d = wrap01(sB - sA), n = Math.max(2, Math.round(d * track.len / 10.5) + 1);
  const tops = [];
  for (let i = 0; i < n; i++) {
    const s = wrap01(sA + d * i / (n - 1)), p = posAt(s, lat);
    const g = new THREE.Group();
    g.add(mk(G.cyl6, lam(0x4a3a2c), 0, 3, 0, .24, 6, .24, 0, true));

    if (i % 2 === 0) addPool(posAt(s, lat * .45).x, posAt(s, lat * .45).z, 9, .13);
  }
  for (let i = 0; i < n - 1; i++) {
    const a = tops[i], b = tops[i + 1];

    const wire = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3([a, mid, b]), 10, .04, 5), lam(0x1c1d26));

  }

  const st = mk(new THREE.TorusGeometry(.3, .065, 6, 14), pho(0x22232e, 24, 0x30303e), 0, 1.16, .56);
  st.rotation.x = -1.05; g.add(st);
  g.add(mk(G.cyl6, pho(0x8a8da0, 50, 0x666a80), 0, 1.0, .5, .06, .38, .06));  // steering column
  // emblem (front + rear — camera sees the back)
  const em = textTex(64, 64, (gc, w, h) => {
    gc.fillStyle = '#12131e'; gc.beginPath(); gc.arc(w / 2, h / 2, 28, 0, TAU); gc.fill();
    gc.strokeStyle = '#3a3c55'; gc.lineWidth = 3; gc.stroke();

  g.add(mk(G.plane, new THREE.MeshBasicMaterial({ map: em, transparent: true }), 0, .62, 1.87, .52, .52, 1));
  const emB = mk(G.plane, new THREE.MeshBasicMaterial({ map: em, transparent: true }), 0, 1.1, -1.02, .48, .48, 1);
  emB.rotation.y = Math.PI; g.add(emB);
  // wheels — fat dark tires, small bright hub
  const wheels = [], wg = new THREE.CylinderGeometry(.5, .5, .46, 14);
  const tireM = pho(0x121318, 12, 0x24242e), hubM = pho(0xd3d7e4, 72, 0x9a9eb8);
  for (const [x, z, fr] of [[-.98, 1.0, 1], [.98, 1.0, 1], [-1.02, -.9, 0], [1.02, -.9, 0]]) {
    const pivot = new THREE.Group(); pivot.position.set(x, .5, z);
    const w = new THREE.Mesh(wg, tireM); w.rotation.z = Math.PI / 2; w.castShadow = true;
    const hub = mk(G.cyl6, hubM, 0, 0, 0, .38, .5, .38); hub.rotation.z = Math.PI / 2;
    const cap = mk(G.cyl6, pho(0x2a2b36, 20, 0x30303c), 0, 0, 0, .13, .54, .13); cap.rotation.z = Math.PI / 2;
    pivot.add(w); pivot.add(hub); pivot.add(cap); g.add(pivot);
    wheels.push({ pivot, w, hub, fr });
  }
  // driver
  const drv = new THREE.Group(); drv.position.set(0, 1.04, -.36);
  const hood = opts.hoodie || 0x2e2b3c;
  const hoodM = pho(hood, 22, 0x2a2a38);
  drv.add(mk(G.box, hoodM, 0, .3, 0, .74, .6, .5, 0, true));                  // torso
  drv.add(mk(G.box, pho(new THREE.Color(hood).multiplyScalar(.68).getHex(), 18, 0x22222e), 0, .5, -.24, .56, .32, .18)); // hood
  for (const sx of [-1, 1]) {                                                 // arms
    const arm = mk(G.box, hoodM, sx * .38, .42, .4, .16, .15, .74);
    arm.rotation.x = -.5; arm.rotation.y = sx * -.22; drv.add(arm);
    drv.add(mk(G.sph, lam(0xe8b98a), sx * .28, .22, .8, .15, .15, .15));      // hands
  }
  const skin = pho(0xf0c092, 14, 0x40352e);
  drv.add(mk(G.sph, skin, 0, .82, .02, .54, .54, .54, 0, true));              // head
  if (opts.helmet) {
    drv.add(mk(new THREE.SphereGeometry(.3, 12, 9, 0, TAU, 0, Math.PI * .6), pho(opts.helmet, 60, 0x555570), 0, .86, .02, 1.06, 1.06, 1.06));
    drv.add(mk(G.box, bas(0x161826), 0, .82, .25, .42, .17, .18));            // visor
    drv.add(mk(G.box, pho(new THREE.Color(opts.helmet).multiplyScalar(.6).getHex(), 40, 0x444458), 0, 1.14, -.04, .1, .16, .34)); // fin
  } else {
    const hairM = pho(0x4a331e, 14, 0x2c2016);
    drv.add(mk(G.sph, hairM, 0, .96, -.06, .58, .44, .6));                    // hair volume
    drv.add(mk(G.sph, hairM, 0, .84, -.22, .5, .4, .3));                      // nape
    for (let i = 0; i < 7; i++) {                                             // chunky crown spikes
      const a = -1 + i * .333;
      const sp = mk(G.cone, hairM, Math.sin(a) * .26, 1.16, -.1 - Math.cos(a) * .1, .22, .34, .2);
      sp.rotation.z = -Math.sin(a) * .85; sp.rotation.x = -.42 + Math.cos(a) * .12;
      sp.castShadow = true; drv.add(sp);
    }
    for (const bx of [-.14, .02, .16]) {                                      // bangs
      const bg2 = mk(G.cone, hairM, bx, 1.0, .2, .15, .24, .13);
      bg2.rotation.x = 1.15; bg2.rotation.z = -bx * 1.4; drv.add(bg2);
    }
  }
  g.add(drv);
  // boost flame
  const flame = mk(new THREE.ConeGeometry(.3, 1.3, 8), bas(0xffa040, { transparent: true, opacity: .9, blending: THREE.AdditiveBlending, depthWrite: false }), 0, .55, -1.95);
  flame.rotation.x = -Math.PI / 2; flame.visible = false; g.add(flame);
  const flameGlow = glowSprite(TEX.glowO, 2.4, .7); flameGlow.position.set(0, .6, -1.85); flameGlow.visible = false; g.add(flameGlow);
  // blob shadow
  const blob = mk(G.plane, new THREE.MeshBasicMaterial({ map: TEX.shadow, transparent: true, depthWrite: false }), 0, 0, 0, 3.1, 3.6, 1);
  blob.rotation.x = -Math.PI / 2;
  return { group: g, wheels, flame, flameGlow, blob, body };
}

const RACER_DEF = [
  { name: 'あなた', color: 0x6a38d8, crown: true, hoodie: 0x2c2836, isPlayer: true },
  { name: 'レン', color: 0x1fa098, mark: 'R', helmet: 0x1fa098, ai: { skill: .98, wob: 1.05, wobF: .5, late: 0 } },
  { name: 'アカネ', color: 0xd8443a, mark: 'A', helmet: 0xd8443a, ai: { skill: 1.03, wob: 1.8, wobF: .85, late: 0, aggro: 1 } },
  { name: 'ヒナタ', color: 0xdb9c22, mark: 'H', helmet: 0xdb9c22, ai: { skill: .96, wob: 1.45, wobF: .6, late: .06 } },
];
function initRacers() {

    const k = buildKart(d.color, d);

    return {
      def: d, name: d.name, color: d.color, isPlayer: !!d.isPlayer, kart: k,
      pos: new THREE.Vector3(), heading: 0, speed: 0, vy: 0, airborne: false, wasRamp: false,
      s: 0, lat: 0, hint: 0, totalProg: 0, prevS: 0, lapsDone: 0, finished: false, finishT: 0,
      boostT: 0, boostF: 1, wallCd: 0, spinT: 0, spinPh: 0,
      drifting: false, driftDir: 0, driftQ: 0,
      item: null, roulT: 0, shieldT: 0, shieldMesh: null,
      wrongT: 0, stuckT: 0, aiT: rnd(0, 2), aiLane: 0, autoPilot: false,
      visLean: 0, visPitch: 0,
      proj: { s: 0, lat: 0, idx: 0 },
    };
  });
}
function resetRace() {
  const slots = [[-3.2, 0], [3.2, 0], [-3.2, 1], [3.2, 1]];        // CPU1,CPU2,CPU3,player
  const order = [racers[1], racers[2], racers[3], racers[0]];
  order.forEach((r, i) => {
    const [lat, row] = slots[i], off = .014 + row * .012;
    r.s = wrap01(track.finishS - off); r.lat = lat;
    posAt(r.s, r.lat, r.pos); r.pos.y = 0;
    const f = fwdAt(r.s); r.heading = Math.atan2(f.x, f.z);
    r.hint = Math.round(r.s * track.n) % track.n;
    r.prevS = r.s; r.totalProg = -off; r.lapsDone = 0;
    r.speed = 0; r.vy = 0; r.airborne = false; r.wasRamp = false;
    r.finished = false; r.finishT = 0; r.boostT = 0; r.boostF = 1; r.wallCd = 0; r.spinT = 0;
    r.drifting = false; r.driftQ = 0; r.item = null; r.roulT = 0;
    r.wrongT = 0; r.stuckT = 0; r.autoPilot = false; r.aiT = rnd(.4, 2);
    r.driftStage = 0; r.roulTick = 0; r.bumpCd = 0;
    r.steerVis = 0; r.curveT = 0; r.ctCd = 0; r.airT = 0; r.bumpCombo = 0; r.lastBumpT = -9;
    r.draft = 1; r.kick = 0; r.blockCd = 0; r.lastHitByPlayerT = -9;
    r.aiT2 = rnd(3, 8); r.ramCd = 0;
    if (r.shieldMesh) { scene.remove(r.shieldMesh); r.shieldMesh = null; }
    r.shieldT = 0;
    r.kart.group.position.copy(r.pos); r.kart.group.rotation.set(0, r.heading, 0);
    r.kart.flame.visible = r.kart.flameGlow.visible = false;
  });
  for (const b of itemBoxes) { b.active = true; b.respT = 0; b.grp.visible = true; b.grp.scale.setScalar(1); }
  for (const c of cones) {
    c.state = 'idle'; c.pop = 0; c.t = 0;
    c.m.position.set(c.ox, 0, c.oz); c.m.rotation.set(0, rnd(0, TAU), 0); c.m.scale.setScalar(1);
  }
  for (const b of blocks) { b.wob = 0; b.m.rotation.x = 0; }
  projectiles.forEach(p => scene.remove(p.grp)); projectiles.length = 0;
  hazards.forEach(h => scene.remove(h.grp)); hazards.length = 0;
}

/* ---------------- physics ---------------- */
const _f = new THREE.Vector3();
function effTurn(r) { return lerp(CFG.TURN_LO, CFG.TURN_HI, clamp(Math.abs(r.speed) / CFG.MAXSPD, 0, 1)); }
function computeDrafts() {
  for (const r of racers) {
    r.draft = 1;
    for (const o of racers) {
      if (o === r) continue;
      const gap = wrapDS(o.s - r.s) * track.len;
      if (gap > 1.5 && gap < 8 && Math.abs(o.lat - r.lat) < 2.1 && o.speed > r.speed * .55) { r.draft = 1.08; break; }
    }
  }
}

function updatePlayer(r, dt) {
  if (r.spinT > 0) { r.speed = damp(r.speed, r.speed * .4, 3, dt); return; }
  if (r.autoPilot) { aiDrive(r, dt, 1); return; }
  let steer = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
  if (!steer && tiltOn) steer = tiltSteer;
  r.steerVis = steer;
  const grounded = !r.airborne;
  const throttle = keys.up || (touchMode && !keys.down);
  // drift start
  if (keys.drift && !r.drifting && grounded && r.speed > 9 && Math.abs(steer) > .2) {
    r.drifting = true; r.driftDir = Math.sign(steer); r.driftQ = 0;
    r.vy = 3.4; r.airborne = true; AudioSys.sfx.jump();
  }
  if (r.drifting) {
    if (!keys.drift || r.speed < 6) {                              // release
      if (r.driftQ >= CFG.DRIFT_S2) { r.boostF = 1.4; r.boostT = Math.max(r.boostT, .9); AudioSys.sfx.boost(); flash('160,120,255', .16); }
      else if (r.driftQ >= CFG.DRIFT_S1) { r.boostF = Math.max(r.boostF, 1.32); r.boostT = Math.max(r.boostT, .6); AudioSys.sfx.boost(); flash('120,200,255', .12); }
      r.drifting = false; r.driftQ = 0; r.driftStage = 0;
    } else {
      if (grounded && r.speed > 9) r.driftQ += dt;
      const stg = r.driftQ >= CFG.DRIFT_S2 ? 2 : (r.driftQ >= CFG.DRIFT_S1 ? 1 : 0);
      if (stg !== r.driftStage) { r.driftStage = stg; if (stg) AudioSys.sfx.driftStage(stg); }
      r.heading += (r.driftDir * 1.3 + steer * .65) * effTurn(r) * dt;
    }
  } else if (Math.abs(r.speed) > .4) {
    r.heading += steer * effTurn(r) * dt * (r.airborne ? .4 : 1) * (r.speed < 0 ? -1 : 1);
  }
  // throttle
  const maxE = CFG.MAXSPD * r.boostF * r.draft;
  if (r.boostT > 0) r.speed = Math.max(r.speed, damp(r.speed, maxE, 3.4, dt));
  if (throttle) r.speed = Math.min(r.speed + CFG.ACCEL * dt, maxE);
  else if (keys.down) r.speed = Math.max(r.speed - CFG.BRAKE * dt, -CFG.REV_MAX);
  else r.speed = r.speed > 0 ? Math.max(0, r.speed - CFG.COAST * dt) : Math.min(0, r.speed + CFG.COAST * dt);
}

function aiDrive(r, dt, forceSkill) {
  if (r.spinT > 0) { r.speed = damp(r.speed, r.speed * .4, 3, dt); return; }
  const ai = r.def.ai || { skill: .95, wob: 1.2, wobF: .5, late: 0 };
  let skill = forceSkill || ai.skill;
  if (!forceSkill) {
    if (ai.late && r.lapsDone >= 2) skill = ai.skill + ai.late;
    const diff = racers[0].totalProg - r.totalProg;               // rubber band vs player
    skill *= clamp(1 + diff * .45, .96, 1.22);
    r.aiT2 -= dt;                                                  // periodic attack turbo
    if (r.aiT2 <= 0) {
      r.aiT2 = rnd(9, 14);
      if (r.boostT <= 0) { r.boostF = Math.max(r.boostF, 1.12); r.boostT = .35; }
    }
  }
  let lane = Math.sin(raceT * ai.wobF + r.def.color) * ai.wob;
  for (const b of boostPads) {                                     // hunt boost pads
    const ds = wrapDS(b.s - r.s);
    if (ds > 0 && ds < 20 / track.len) { lane = lerp(lane, 0, .9); break; }
  }
  for (const c of cones) {                                         // weave around cones
    if (c.state !== 'idle') continue;
    const ds = wrapDS(c.s - r.s);
    if (ds > 0 && ds < 12 / track.len && Math.abs(c.lat - lane) < 1.8) {
      lane = c.lat + (lane >= c.lat ? 2.1 : -2.1); break;
    }
  }
  for (const b of blocks) {                                        // and barrier blocks
    const ds = wrapDS(b.s - r.s);
    if (ds > 0 && ds < 12 / track.len && Math.abs(b.lat - lane) < 2.6) {
      lane = b.lat + (lane >= b.lat ? 3 : -3); break;
    }
  }
  if (ai.aggro) {                                                  // アカネ: hunts the player for bumps
    const pl = racers[0], dsp = wrapDS(pl.s - r.s);
    if (r.ramCd > 0) r.ramCd -= dt;
    if (dsp > 0 && dsp < 9 / track.len && Math.abs(pl.lat - r.lat) < 3.2 && r.spinT <= 0) {
      lane = lerp(lane, clamp(pl.lat, -5, 5), .55);
      if (dsp < 5 / track.len && Math.abs(pl.lat - r.lat) < 1.25 && r.ramCd <= 0) {
        r.boostF = Math.max(r.boostF, 1.14); r.boostT = Math.max(r.boostT, .25); r.ramCd = 5.5;
      }
    }
  }
  if (!r.item && r.roulT <= 0) {                                   // hunt item boxes
    for (const b of itemBoxes) {
      if (!b.active) continue;
      const ds = wrapDS(b.s - r.s);
      if (ds > 0 && ds < 14 / track.len) { lane = lerp(lane, clamp(b.lat, -4.5, 4.5), .85); break; }
    }
  }
  r.aiLane = lane;
  const look = 6 + Math.abs(r.speed) * .55;
  const ts = wrap01(r.s + look / track.len);
  const tp = posAt(ts, clamp(r.aiLane, -CFG.MAXLAT + 1.4, CFG.MAXLAT - 1.4), _f);
  const want = Math.atan2(tp.x - r.pos.x, tp.z - r.pos.z);
  let dh = want - r.heading;
  while (dh > Math.PI) dh -= TAU; while (dh < -Math.PI) dh += TAU;
  const maxStep = effTurn(r) * 1.7 * dt;
  r.heading += clamp(dh, -maxStep, maxStep);
  r.steerVis = clamp(dh * 2.6, -1, 1);
  // curvature slowdown
  fwdAt(r.s, _f);
  const f2 = fwdAt(wrap01(r.s + (10 + Math.abs(r.speed) * .5) / track.len), new THREE.Vector3());
  const ang = Math.acos(clamp(_f.dot(f2), -1, 1));
  let target = CFG.MAXSPD * skill * (1 - clamp(ang * .26, 0, .36)) * r.draft;
  const maxE = CFG.MAXSPD * r.boostF * r.draft;
  if (r.boostT > 0) target = Math.max(target, maxE);
  // corner-exit mini turbo (drift emulation)
  if (r.ctCd > 0) r.ctCd -= dt;
  if (ang > .2 && !r.airborne) r.curveT += dt;
  else if (ang < .1) {
    if (r.curveT > .55 && r.ctCd <= 0 && !r.airborne) {
      r.boostF = Math.max(r.boostF, 1.24); r.boostT = Math.max(r.boostT, .45); r.ctCd = 1.6;
      spawnHitSparks(r.pos, 5);
    }
    r.curveT = 0;
  }
  if (r.speed < target) r.speed = Math.min(r.speed + CFG.ACCEL * dt, Math.max(target, maxE));
  else r.speed = Math.max(target, r.speed - CFG.BRAKE * .7 * dt);
  // stuck recovery
  if (Math.abs(r.speed) < 2 && state === 'race') {
    r.stuckT += dt;
    if (r.stuckT > 1.8) {
      posAt(r.s, 0, r.pos); r.pos.y = 0; r.lat = 0; r.vy = 0;
      const f = fwdAt(r.s); r.heading = Math.atan2(f.x, f.z); r.stuckT = 0;
    }
  } else r.stuckT = 0;
}

function stepRacer(r, dt) {
  if (r.boostT > 0) { r.boostT -= dt; if (r.boostT <= 0) { r.boostF = 1; } }
  if (r.wallCd > 0) r.wallCd -= dt;
  if (r.spinT > 0) { r.spinT -= dt; r.spinPh += dt * 11.4; }
  if (r.shieldT > 0) { r.shieldT -= dt;
    if (r.shieldT <= 0 && r.shieldMesh) { scene.remove(r.shieldMesh); r.shieldMesh = null; } }
  // integrate
  const slip = r.drifting ? -r.driftDir * .34 : 0;
  const h = r.heading + slip;
  r.pos.x += Math.sin(h) * r.speed * dt;
  r.pos.z += Math.cos(h) * r.speed * dt;
  // project to track, wall clamp
  project(r.pos, r.hint, r.proj);
  r.hint = r.proj.idx;
  let lat = r.proj.lat;
  if (Math.abs(lat) > CFG.MAXLAT) {
    const p = posAt(r.proj.s, Math.sign(lat) * CFG.MAXLAT, _f);
    r.pos.x = p.x; r.pos.z = p.z;
    lat = Math.sign(lat) * CFG.MAXLAT;
    const f = fwdAt(r.proj.s), fh = Math.atan2(f.x, f.z);
    r.heading = angLerp(r.heading, fh, r.isPlayer ? .16 : .3);
    if (r.wallCd <= 0) {
      r.speed *= r.isPlayer ? .62 : .93;
      r.wallCd = CFG.WALL_CD;
      if (r.isPlayer) {
        AudioSys.sfx.hit(); shake(.25);
        spawnHitSparks(r.pos, 9); spawnRing(r.pos, 1.8, .28);
        flash('255,140,60', .1); hitstop(.05);
      }
    }
  }
  const sNow = r.proj.s;
  r.lat = lat;
  // laps / progress
  const ds = wrapDS(sNow - r.prevS);
  if (state === 'race' || state === 'finished') r.totalProg += ds;
  r.prevS = sNow; r.s = sNow;
  if (!r.finished && r.totalProg >= CFG.LAPS) {
    r.finished = true; r.finishT = raceT;
    if (r.isPlayer) onPlayerFinish(); else if (state === 'finished') refreshResults();
  }
  const prevLaps = r.lapsDone;
  r.lapsDone = Math.max(0, Math.floor(r.totalProg));
  if (r.isPlayer && state === 'race' && r.lapsDone > prevLaps && !r.finished && r.lapsDone < CFG.LAPS - 1) {
    AudioSys.sfx.lap(); AudioSys.sfx.cheer(1.1);
    spawnConfetti(r.pos, 22, ['#f2c14e', '#c88bff', '#8ceaff', '#ffffff']);
    toast('LAP ' + (r.lapsDone + 1) + '!');
  }
  // vertical / ramp
  const wasR = onRamp(r.s), gH = groundHeightAt(r.s);
  if (r.airborne) {
    r.airT += dt;
    r.vy -= CFG.GRAV * dt; r.pos.y += r.vy * dt;
    if (r.pos.y <= gH && r.vy <= 0) {
      r.pos.y = gH; r.airborne = false; r.vy = 0;
      if (r.isPlayer) {
        AudioSys.sfx.land(); spawnDust(r.pos); shake(.12);
        if (r.airT > .45 && state === 'race') {
          AudioSys.sfx.nice(); toast('🛬 ナイスジャンプ！'); flash('160,220,255', .14);
          r.boostF = Math.max(r.boostF, 1.14); r.boostT = Math.max(r.boostT, .45);
          spawnHitSparks(r.pos, 10);
        }
      }
      r.airT = 0;
    }
  } else {
    if (r.wasRamp && !wasR && gH < r.pos.y - .4) {                // launched off ramp edge
      r.airborne = true; r.vy = Math.max(4, r.speed * ramp.slope * 1.35);
      if (r.isPlayer) AudioSys.sfx.jump();
    } else r.pos.y = gH;
  }
  r.wasRamp = wasR;
  // boost pads
  if (!r.airborne) {
    for (const b of boostPads) {
      if (Math.abs(wrapDS(r.s - b.s)) < b.halfS && Math.abs(r.lat) < 4) {
        if (r.boostF < CFG.PAD_BOOST || r.boostT < .4) {
          r.boostF = Math.max(r.boostF, CFG.PAD_BOOST); r.boostT = Math.max(r.boostT, CFG.PAD_T);
          b.ph = -perfT * 4;                                       // glow spike to max
          if (r.isPlayer) { AudioSys.sfx.boost(); flash('90,220,255', .18); }
        }
      }
    }
  }
  // wrong way (player only display)
  if (r.isPlayer && state === 'race') {
    fwdAt(r.s, _f);
    const dot = Math.sin(r.heading) * _f.x + Math.cos(r.heading) * _f.z;
    if (dot < -.25 && r.speed > 3) r.wrongT += dt; else r.wrongT = 0;
    DOM.wrongWay.style.display = r.wrongT > .8 ? 'block' : 'none';
  }
  updateKartVisual(r, dt);
}

function updateKartVisual(r, dt) {
  const k = r.kart;
  k.group.position.copy(r.pos);
  let yaw = r.heading + (r.drifting ? -r.driftDir * .42 : 0);
  if (r.spinT > 0) yaw += r.spinPh;
  const sv = r.steerVis || 0;
  r.kick = damp(r.kick || 0, 0, 6, dt);
  const targetLean = (r.drifting ? r.driftDir * .13 : -sv * .07) + r.kick;
  r.visLean = damp(r.visLean, targetLean, 8, dt);
  let pitch = 0;

    if (h.grp.userData.fuse) h.grp.userData.fuse.material.opacity = .5 + Math.random() * .5;
    for (const r of racers) {
      if (r.finished && r.isPlayer) continue;
      const arm = r === h.owner ? 1.0 : .45;
      if (h.age < arm) continue;
      if (Math.abs(wrapDS(r.s - h.s)) * track.len < 1.7 && Math.abs(r.lat - h.lat) < 1.8 && r.pos.y < 1.4) {
        h.gone = true; scene.remove(h.grp);

        spawnPuff(h.grp.position, TEX.glowR, 8, 6, .5);
        AudioSys.sfx.boom();
        spinOut(r, 'bomb', h.owner);
        break;
      }
    }

  }

    if (p.life <= 0) { scene.remove(p.m); p.m.material.dispose(); dusts.splice(i, 1); } }
  for (let i = confetti.length - 1; i >= 0; i--) { const p = confetti[i];
    p.life -= dt; p.vy -= 9 * dt;
    p.m.position.x += p.vx * dt; p.m.position.y += p.vy * dt; p.m.position.z += p.vz * dt;
    p.m.rotation.x += p.rx * dt; p.m.rotation.z += p.rz * dt;
    if (p.life <= 0 || p.m.position.y < 0) { scene.remove(p.m); p.m.material.dispose(); confetti.splice(i, 1); } }
  for (let i = rings.length - 1; i >= 0; i--) { const r = rings[i];
    r.t += dt; const k = r.t / r.life;
    if (k >= 1) { scene.remove(r.m); r.m.material.dispose(); rings.splice(i, 1); continue; }
    const s = .5 + (r.maxScale - .5) * (1 - Math.pow(1 - k, 2.2));
    r.m.scale.set(s, s, 1); r.m.material.opacity = .95 * (1 - k); }
  for (const a of anims) a.fn(a.obj, perfT);
  if (fireflies) { fireflies.material.opacity = .55 + Math.sin(perfT * 2.3) * .3;
    fireflies.material.size = 1.3 + Math.sin(perfT * 1.7) * .4; }
  for (const b of boostPads) {
    const pu = .5 + Math.sin(perfT * 4 + b.ph) * .5;
    b.glow.material.opacity = .34 + pu * .3;
    if (b.light) b.light.intensity = .7 + pu * .55;
  }
}

/* speed lines overlay */
const fxc = DOM.fx2d.getContext('2d');
let vignette = null;
function buildVignette(w, h) {
  const cx = w / 2, cy = h / 2;
  vignette = fxc.createRadialGradient(cx, cy, Math.min(w, h) * .5, cx, cy, Math.hypot(cx, cy) * 1.02);
  vignette.addColorStop(0, 'rgba(8,9,20,0)');
  vignette.addColorStop(.72, 'rgba(8,9,20,.14)');
  vignette.addColorStop(1, 'rgba(8,9,20,.44)');
}
function drawSpeedLines() {
  const w = DOM.fx2d.width, h = DOM.fx2d.height;
  fxc.clearRect(0, 0, w, h);
  if (!vignette) buildVignette(w, h);
  fxc.fillStyle = vignette; fxc.fillRect(0, 0, w, h);
  if (flashA > 0) { fxc.fillStyle = 'rgba(' + flashCol + ',' + flashA.toFixed(3) + ')'; fxc.fillRect(0, 0, w, h); }
  const p = racers && racers[0];
  if (!p || state === 'title') return;
  const inten = clamp((p.boostF > 1.05 && p.boostT > 0 ? .8 : 0) + (p.speed / CFG.MAXSPD - .93) * 3, 0, 1);
  if (inten <= 0) return;
  fxc.strokeStyle = 'rgba(255,255,255,' + (0.3 * inten).toFixed(2) + ')';
  fxc.lineWidth = 2;
  const cx = w / 2, cy = h * .44;
  for (let i = 0; i < 26 * inten; i++) {
    const a = rnd(0, TAU), r0 = rnd(.42, .55) * h, r1 = r0 + rnd(40, 170) * inten;
    fxc.beginPath();
    fxc.moveTo(cx + Math.cos(a) * r0 * 1.5, cy + Math.sin(a) * r0);
    fxc.lineTo(cx + Math.cos(a) * r1 * 1.5, cy + Math.sin(a) * r1);
    fxc.stroke();
  }
}

/* ---------------- camera ---------------- */
const camPos = new THREE.Vector3(), camLook = new THREE.Vector3();
let camFov = 62;
function updateCamera(dt) {
  if (state === 'title') {
    const a = perfT * .11;
    camera.position.set(10 + Math.cos(a) * 165, 84, 12 + Math.sin(a) * 165);
    camera.lookAt(10, 0, 8);
    return;
  }
  const p = racers[0];
  const f = { x: Math.sin(p.heading), z: Math.cos(p.heading) };
  // slight speed-based pullback for boost feel

  const dist = 7.2 + (p.airborne ? 1.4 : 0), hgt = 3.2;
  const side = p.drifting ? -p.driftDir * 1.05 : 0;
  camPos.set(p.pos.x - f.x * dist - f.z * side, p.pos.y + hgt, p.pos.z - f.z * dist + f.x * side);
  camLook.set(p.pos.x + f.x * 5.6, p.pos.y + 1.3, p.pos.z + f.z * 5.6);
  const k = state === 'countdown' ? 20 : 5.2;
  camera.position.x = damp(camera.position.x, camPos.x, k, dt);
  camera.position.y = damp(camera.position.y, camPos.y, k * 1.4, dt);
  camera.position.z = damp(camera.position.z, camPos.z, k, dt);
  if (shakeT > 0) {
    shakeT -= dt;
    camera.position.x += rnd(-1, 1) * shakeMag * shakeT;
    camera.position.y += rnd(-1, 1) * shakeMag * shakeT;
    if (shakeT <= 0) shakeMag = 0;
  }
  camera.lookAt(camLook);
  const wantFov = (p.boostT > 0 && p.boostF > 1.05) ? 71 : 60;
  camFov = damp(camFov, wantFov, 5, dt);
  if (Math.abs(camFov - camera.fov) > .05) { camera.fov = camFov; camera.updateProjectionMatrix(); }
}

/* ---------------- HUD / flow ---------------- */
let state = 'title', raceT = 0, perfT = 0, cdT = 0, finalShown = false, resultShown = false, forceEndT = 0, lastRank = 4;
const ORD = ['st', 'nd', 'rd', 'th'];
function toast(msg) {
  DOM.toast.textContent = msg; DOM.toast.style.display = 'block';
  DOM.toast.classList.remove('toastIn'); void DOM.toast.offsetWidth; DOM.toast.classList.add('toastIn');
  clearTimeout(toast._t); toast._t = setTimeout(() => DOM.toast.style.display = 'none', 1600);
}
function setItemAction(icon, mode) {
  if (!DOM.itemBtn || !DOM.itemBtnIcon) return;
  DOM.itemBtnIcon.textContent = icon || '🎁';
  DOM.itemBtn.classList.toggle('ready', mode === 'ready');
  DOM.itemBtn.classList.toggle('rolling', mode === 'rolling');
  DOM.itemBtn.classList.toggle('empty', mode === 'empty');
}
function updateHUD() {
  const p = racers[0];
  DOM.lapVal.textContent = Math.min(CFG.LAPS, Math.max(1, p.lapsDone + 1)) + '/' + CFG.LAPS;
  DOM.lapTime.textContent = state === 'race' || state === 'finished' ? fmtTime(p.finished ? p.finishT : raceT) : '0:00.00';
  const rk = rankOf(p);
  DOM.posNum.textContent = rk; DOM.posOrd.textContent = ORD[rk - 1];
  if (state === 'race' && rk < lastRank) {
    AudioSys.sfx.rankUp();
    DOM.posBox.classList.remove('rankUp'); void DOM.posBox.offsetWidth; DOM.posBox.classList.add('rankUp');
    if (rk === 1) { flash('255,215,110', .24); toast('👑 トップに立った！'); }
  }
  lastRank = rk;
  DOM.speedBox.classList.toggle('boostGlow', p.boostT > 0 && p.boostF > 1.05);
  DOM.speedNum.textContent = Math.round(Math.abs(p.speed) * CFG.KMH * (p.boostF > 1 && p.boostT > 0 ? 1 : 1));
  if (p.roulT <= 0) {
    if (p.item) { DOM.itemIcon.textContent = ITEMS[p.item].icon; DOM.itemCount.style.display = 'flex'; DOM.itemCount.textContent = '1'; setItemAction(ITEMS[p.item].icon, 'ready'); }
    else { DOM.itemIcon.textContent = ''; DOM.itemCount.style.display = 'none'; setItemAction('🎁', 'empty'); }
  }
}
function showCount(txt, cls) {
  DOM.countdown.textContent = txt; DOM.countdown.style.display = 'block';
  DOM.countdown.classList.remove('pop'); void DOM.countdown.offsetWidth; DOM.countdown.classList.add('pop');
  if (txt !== 'GO!') flash('255,255,255', .07);
}
function showBanner(txt) {
  DOM.banner.textContent = txt; DOM.banner.style.display = 'block';
  DOM.banner.classList.remove('bannerIn'); void DOM.banner.offsetWidth; DOM.banner.classList.add('bannerIn');
  setTimeout(() => DOM.banner.style.display = 'none', 2400);
}
function startRace() {
  if (state !== 'title') return;
  AudioSys.unlock();
  DOM.title.style.display = 'none';
  DOM.hud.style.display = 'block';
  resetRace();
  state = 'countdown'; cdT = 3.6; raceT = 0; finalShown = false; resultShown = false; forceEndT = 0; lastRank = 4;
  cdT_last = 4;
  // snap camera behind player
  const p = racers[0], f = { x: Math.sin(p.heading), z: Math.cos(p.heading) };
  camera.position.set(p.pos.x - f.x * 7.3, 3.4, p.pos.z - f.z * 7.3);
  AudioSys.startBGM(); AudioSys.setTempo(148);
}
let cdT_last = 4, fwNext = 0;
function updateCountdown(dt) {
  cdT -= dt;
  const n = Math.ceil(cdT - .3);
  if (n !== cdT_last && n >= 1 && n <= 3) { showCount(String(n)); AudioSys.sfx.count(); cdT_last = n; }
  if (cdT <= .3 && cdT_last !== 0) {
    showCount('GO!'); AudioSys.sfx.go(); AudioSys.sfx.cheer(2.2); flash('255,240,180', .28); cdT_last = 0;
    for (const r of racers) {
      if (r.isPlayer) {
        if (keys.up) {
          r.boostF = Math.max(r.boostF, 1.32); r.boostT = Math.max(r.boostT, .75);
          AudioSys.sfx.nice(); toast('🚀 ロケットスタート！');
        }
      } else { r.boostF = 1.3; r.boostT = .8; }
    }
    const gp = posAt(track.finishS, 0);
    spawnConfetti(new THREE.Vector3(gp.x, 7, gp.z), 50, ['#f2c14e', '#7b48e8', '#e0a33c', '#4fae8f', '#ff6a70']);
  }
  if (cdT <= 0) { state = 'race'; setTimeout(() => DOM.countdown.style.display = 'none', 700); }
}
function onPlayerFinish() {
  AudioSys.sfx.finish(); AudioSys.sfx.cheer(3.5);
  const gp = posAt(track.finishS, 0);
  spawnConfetti(new THREE.Vector3(gp.x, 8, gp.z), 90, ['#f2c14e', '#7b48e8', '#e0a33c', '#4fae8f', '#ff6a70', '#5ad2ff']);
  flash('255,225,140', .3);
  for (let i = 0; i < 7; i++) {
    setTimeout(() => { if (state !== 'finished') return;
      const p = racers[0];
      spawnFirework(p.pos.x + rnd(-26, 26), rnd(14, 26), p.pos.z + rnd(-26, 26));
    }, 350 + i * 620);
  }
  racers[0].autoPilot = true;
  DOM.wrongWay.style.display = 'none';
  state = 'finished'; forceEndT = 8;
  const rk = rankOf(racers[0]);
  DOM.resultHead.textContent = rk === 1 ? '🏆 1st FINISH!' : 'FINISH!';
  setTimeout(() => { DOM.result.style.display = 'flex'; refreshResults(true); resultShown = true; fwNext = perfT + 1.4; }, 1300);
}
function refreshResults(animate) {
  if (!resultShown && DOM.result.style.display !== 'flex') return;
  const sorted = racers.slice().sort((a, b) => {
    if (a.finished && b.finished) return a.finishT - b.finishT;
    if (a.finished) return -1; if (b.finished) return 1;
    return b.totalProg - a.totalProg;
  });
  const bc = ['#ffd257', '#cfd4e2', '#d9945a', '#8b8fa8'];
  DOM.resultRows.innerHTML = '';
  sorted.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'rrow' + (r.isPlayer ? ' me' : '') + (animate ? ' rrowIn' : '');
    if (animate) row.style.animationDelay = (i * 110) + 'ms';
    row.innerHTML = '<div class="rbadge" style="background:' + bc[i] + '">' + (i + 1) + ORD[i] + '</div>' +
      '<div class="rname"><span class="rdot" style="background:#' + r.color.toString(16).padStart(6, '0') + '"></span>' +
      r.name + '</div><div class="rtime">' + (r.finished ? fmtTime(r.finishT) : '走行中…') + '</div>';
    DOM.resultRows.appendChild(row);
  });
}
function retryRace() {
  DOM.result.style.display = 'none'; resultShown = false;
  state = 'title'; DOM.hud.style.display = 'none'; DOM.title.style.display = 'flex';
  AudioSys.stopBGM();
  resetRace();
  startRace();
}
$('startBtn').addEventListener('click', startRace);
$('retryBtn').addEventListener('click', () => { state = 'title'; DOM.result.style.display = 'none'; resultShown = false;
  AudioSys.stopBGM(); startRace(); });

/* ---------------- main loop ---------------- */
function resize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  DOM.fx2d.width = innerWidth; DOM.fx2d.height = innerHeight;
  buildVignette(innerWidth, innerHeight);
}
addEventListener('resize', resize);

function tick() {
  requestAnimationFrame(tick);
  const rawDt = Math.min(clock.getDelta(), .05);
  let dt = rawDt;
  if (hitstopT > 0) { hitstopT -= rawDt; dt = rawDt * .12; }
  perfT += rawDt;
  if (state === 'countdown') updateCountdown(dt);
  if (state === 'race' || state === 'finished') raceT += dt;
  if (state !== 'title') {
    computeDrafts();
    for (const r of racers) {
      if (state === 'race' || state === 'finished') {
        if (r.isPlayer) updatePlayer(r, dt); else aiDrive(r, dt);
      } else r.speed = 0;
      stepRacer(r, dt);
    }
    racerCollisions(dt);
    updateObstacles(dt);
    for (const r of racers) if (r.blockCd > 0) r.blockCd -= dt;
    if (state === 'race' || state === 'finished') updateItems(dt);
    // final lap
    const p = racers[0];
    if (!finalShown && p.lapsDone + 1 >= CFG.LAPS && state === 'race') {
      finalShown = true; showBanner('FINAL LAP!'); AudioSys.setTempo(160); AudioSys.sfx.decide(); flash('180,140,255', .2);
    }
    updateHUD();
    AudioSys.engine(clamp(Math.abs(p.speed) / CFG.MAXSPD, 0, 1.1), state !== 'title');
    if (state === 'finished') {
      if (resultShown && perfT > fwNext) {
        fwNext = perfT + rnd(1.2, 2.1);
        const pl = racers[0];
        spawnFirework(pl.pos.x + rnd(-30, 30), rnd(15, 27), pl.pos.z + rnd(-30, 30));
      }
      if (resultShown && Math.floor(perfT * 3) !== Math.floor((perfT - dt) * 3)) refreshResults();
      if (forceEndT > 0) {
        forceEndT -= dt;
        if (forceEndT <= 0) {
          for (const r of racers) if (!r.finished) {
            r.finished = true;
            r.finishT = raceT + Math.max(0, CFG.LAPS - r.totalProg) * (track.len / (CFG.MAXSPD * .8));
          }
          refreshResults();
        }
      }
    }
  }
  flashA = Math.max(0, flashA - dt * 2.2);
  updateFx(dt);
  updateCamera(dt);
  drawSpeedLines();
  renderer.render(scene, camera);
}

/* ---------------- boot ---------------- */
function boot() {
  buildTextures(660);
  initScene();
  buildTrack();
  buildRoad();
  buildWorld();
  initRacers();
  resetRace();
  resize();
  tick();
}
boot();
</script>
